server:
  port: ${HTTP_PORT:8080}
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 15s

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/taskflow?stringtype=unspecified}
    username: ${DATABASE_USER:taskflow}
    password: ${DATABASE_PASSWORD:taskflow}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET:}
    expiry-hours: 24
  cors:
    origin: ${CORS_ORIGIN:http://localhost:3000}
  bcrypt:
    cost: ${BCRYPT_COST:12}
  seed:
    enabled: ${RUN_SEED:false}
